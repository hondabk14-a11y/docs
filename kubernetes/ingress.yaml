apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepcore-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
    - hosts:
        - deepcore.example.com
      secretName: deepcore-tls
  rules:
    - host: deepcore.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deepcore-api-service
                port:
                  number: 80
